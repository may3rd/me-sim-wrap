name: release-gates

on:
  push:
  pull_request:

jobs:
  python:
    name: Python 3.12 / ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-14
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install .
      - run: python -m unittest discover -s tests
      - run: python scripts/validate.py --quiet
      - run: python benchmarks/benchmark_release.py --core-samples 20 --api-samples 3

  container:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag me-sim-wrap:0.1.0 .
      - run: docker run --rm me-sim-wrap:0.1.0 python -c "import mesim; assert mesim.__version__ == '0.1.0'"
